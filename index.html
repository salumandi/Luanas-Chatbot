<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Für mein Herz 💖</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255, 206, 226, 0.8), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 177, 205, 0.7), transparent 35%),
        linear-gradient(135deg, #fff0f6, #ffd9e8, #ffeef6);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      color: #5e2745;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -30px;
      font-size: 18px;
      opacity: 0.25;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) scale(1);
        opacity: 0.3;
      }
      to {
        transform: translateY(-110vh) scale(1.5);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(170, 70, 115, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .top-section {
      background: linear-gradient(135deg, #ff8fb1, #ffb5ca, #ffd2df);
      color: white;
      text-align: center;
      padding: 24px 20px 18px;
    }

    .photo-frame {
      width: 130px;
      height: 130px;
      margin: 0 auto 14px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,0.85);
      box-shadow: 0 10px 24px rgba(0,0,0,0.14);
      background: #fff5f9;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .top-section h1 {
      margin: 0;
      font-size: 1.45rem;
    }

    .top-section p {
      margin: 8px 0 0;
      font-size: 0.95rem;
      opacity: 0.96;
    }

    .chat-box {
      height: 360px;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(255, 247, 250, 0.7);
    }

    .message {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.45;
      font-size: 0.97rem;
      box-shadow: 0 6px 18px rgba(143, 62, 101, 0.08);
    }

    .bot {
      align-self: flex-start;
      background: linear-gradient(135deg, #ffe0eb, #ffd1e3);
      color: #6b2e4d;
      border-bottom-left-radius: 6px;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #ff74a3, #ff97ba);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: rgba(255,255,255,0.82);
      border-top: 1px solid rgba(255, 198, 218, 0.55);
    }

    .input-area input {
      flex: 1;
      padding: 13px 15px;
      border: 1px solid #f2bfd2;
      border-radius: 999px;
      outline: none;
      font-size: 0.95rem;
    }

    .input-area button {
      border: none;
      border-radius: 999px;
      padding: 0 18px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6e9e, #ff8fb1);
      color: white;
    }
  </style>
</head>

<body>
  <div class="hearts" id="hearts"></div>

  <div class="container">
    <div class="top-section">
      <div class="photo-frame">
        <img src="foto.jpg" alt="Unser Foto">
      </div>

      <h1>Für minha Amorada mais linda gostosa do mundo ❤️</h1>
      <p>E chline Chatbot für mini número um e minha favorita pessoa uf dere ganze Welt</p>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Schreib mir etwas..." />
      <button onclick="sendMessage()">Senden</button>
    </div>
  </div>

  <script>
    // Herzen
    const heartsContainer = document.getElementById("hearts");

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (6 + Math.random() * 6) + "s";
      heartsContainer.appendChild(heart);

      setTimeout(() => heart.remove(), 12000);
    }

    setInterval(createHeart, 700);

    // Chat
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    function addMessage(text, sender) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    addMessage("Oi Amorli, was chani für dich? 💕", "bot");

    const rules = [
      {
        keywords: ["oi"],
        response: "boa tarde meu amor da minha vidaa 💖"
      },
      {
        keywords: ["was bisch am mache?"],
        response: "Mir am vorstelle wini di ganz fest umarme und mit beijoss überfluete 🥰"
      },
      {
  keywords: ["was isch üses ding?"],
  response: "du weisch genau das wir dois safados si ;) aber näbst dämm isch egal was wir mache, alles ish üses ding da sich jede moment zemme ungloublich schön und einzigartig afüehlt"
},
{
  keywords: ["quem?"],
  response: "quem? voce es tudo, voce es meu amor da minha vidaa, voce es minha mais linda gostosa do mundo, voce es luana keller von borstel e eu sou joel keller von borstel"
},
{
  keywords: ["31"],
  response: "31 märz, dä tag wo mini liebi vom läbe uf di wunderschöni welt het dörfe cho. happy happy birthday only to you my love of my life! i freue mi dich bald bi mir zha und endlich ganz vieli witeri moment mit dir chönne zerlebe. Hüt bini zwar nid physisch bi dir aber i gedanke, i denke jede moment a dich und mis herz schlaht un unterbroche für dich. du bringsch mi zum lächle vo tiefstem herze. merci das es dich git, du hesh es rise herz und e gueti seele. mit dir zämme wetti mis läbe verbringe mi schatz. i liebe dich ❤️"
},
{
  keywords: ["bumbum"],
  response: "jaja amorli, wieder a mi arsch am dänke mhmm wart numme bis wir wieder binenand sie wasi mit dim arsch mache 😈"
},
{
  keywords: ["video"],
  response: "Amorli du weish haargenau du wirsh dis video becho, so oder so 💕"
},
{
  keywords: ["meh?"],
  response: "du muesh mir numme wörter schribe und i boue dir hie antworte vo mir speziell für dich i 😘"
},
{
  keywords: ["esse"],
  response: "i weiss du liebsch mich amor abr i weiss ou das de esse liebsh haha därum freu di scho jetzt druf uf dini unlimitierte mal fried rice woni für dich wirde mache. natürli mit poulet mi schatz, wir bruche üsi protein für üses cardio zämme 😋"
},
{
  keywords: ["bis gli"],
  response: "bis ganz bald amorli, i freue mi so ungloublich fest uf dich! wenn immer de öppis schöns wettsh läse vo mim herz schrib mir eifach te amo"
},
{
  keywords: ["te amo"],
  response: "i liebe di mi schatz. du bisch mir so ungloublich wichtig amor, üsi liebi ish echt und natürlich und trotz wenig erfahrig bi ig dr meinig das giz nume einish. es isch alles wunderschön mit dir und i bi würklich ungloublich stolz uf dich. i unterstütze dich woni nume cha, wir si es team vergiss das nie. so chei wir alles zämme erreiche was wir üs erträume. i weisses! te amo amor vo ganzem herze, du bish mini liebi vom läbe ❤️"
},
{
  keywords: ["boa noite"],
  response: "mhmm amorli geit ga schlafe. schlaf ganz guet mi schatz, wir wärde üs i üsne träum treffe. te amo meu amor da minha vidaa. boa noite 💕"
}
    ];

    function getBotResponse(input) {
      const text = input.toLowerCase();

      for (const rule of rules) {
        for (const key of rule.keywords) {
          if (text.includes(key)) return rule.response;
        }
      }

      return "Luana keller von borstel, du muesh t wörter woni dir gä ha 1zu1 so ineschribe, schüsch chani nid druf antworte mi schatz 😘";
    }

    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      addMessage(getBotResponse(text), "bot");

      userInput.value = "";
    }

    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
